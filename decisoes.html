<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório de Decisões | Guardiões das Plantas</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow-green: #42f5a7;
            --bg-deep: #061512;
            --strawberry: #ff4757;
            --strawberry-dark: #b33939;
            --parchment: #fdf5e6;
            --glass: rgba(66, 245, 167, 0.05);
            --line-color: rgba(66, 245, 167, 0.2);
        }

        body {
            background-color: var(--bg-deep);
            color: var(--parchment);
            font-family: 'Lexend', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 120px 20px 40px; /* Aumentado o topo para o menu não tapar o título */
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* --- ESTILO DA NAVBAR (Obrigatório em todas as páginas) --- */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 8%;
            background: rgba(6, 21, 18, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--line-color);
            z-index: 2000;
            box-sizing: border-box;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            color: var(--glow-green);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            opacity: 0.7;
        }

        .nav-links a:hover {
            opacity: 1;
            color: var(--glow-green);
        }

        /* Menu Mobile */
        .menu-toggle { display: none; cursor: pointer; }
        .bar { display: block; width: 25px; height: 3px; margin: 5px; background-color: white; transition: 0.3s; }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .nav-links {
                display: none;
                position: absolute;
                top: 100%; left: 0; width: 100%;
                background: rgba(6, 21, 18, 0.95);
                flex-direction: column; padding: 20px; text-align: center;
            }
            .nav-links.active { display: flex; }
        }

        /* --- CONTEÚDO DO JOGO --- */
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--glow-green); text-shadow: 0 0 10px rgba(66, 245, 167, 0.5); font-size: 2.5rem; }

        #game-container {
            background: rgba(6, 21, 18, 0.9);
            border: 2px solid var(--glow-green);
            border-radius: 30px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 0 40px rgba(66, 245, 167, 0.2);
            text-align: center;
        }

        .question { font-size: 1.3rem; margin-bottom: 30px; line-height: 1.5; }

        .options { display: grid; gap: 15px; }
        .option-btn {
            background: var(--glass);
            border: 1px solid var(--glow-green);
            color: white;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            text-align: left;
            font-family: 'Lexend', sans-serif;
        }
        .option-btn:hover { background: var(--glow-green); color: var(--bg-deep); transform: translateX(10px); }

        #feedback { margin-top: 20px; padding: 20px; border-radius: 15px; display: none; font-weight: bold; }
        .correct { background: rgba(46, 204, 113, 0.3); color: #2ecc71; border: 1px solid #2ecc71; }
        .wrong { background: rgba(231, 76, 60, 0.3); color: #ff4757; border: 1px solid #ff4757; }

        .btn-next {
            background: var(--strawberry) !important;
            color: white !important;
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            font-weight: 800;
            margin-top: 30px;
            cursor: pointer;
            display: none;
            text-transform: uppercase;
            box-shadow: 0 6px 0 var(--strawberry-dark);
            text-decoration: none;
        }
        .btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 0 var(--strawberry-dark); }
    </style>
</head>
<body>

    <!-- MENU DE NAVEGAÇÃO -->
    <nav class="navbar">
        <div class="nav-logo">
            <img src="images/super-morango.png" alt="Logo" style="width: 30px;">
            <span>GUARDIÕES</span>
        </div>
        <ul class="nav-links" id="nav-list">
            <li><a href="index.html">Início</a></li>
            <li><a href="historia.html">História</a></li>
            <li><a href="jogo.html">Missão</a></li>
            <li><a href="decisoes.html">Laboratório</a></li>
            <li><a href="saiba-mais.html">Saiba Mais</a></li>
            <li><a href="recursos.html">Recursos</a></li>
        </ul>
        <div class="menu-toggle" onclick="toggleMenu()">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>

    <div class="header">
        <h1>Laboratório de Decisões</h1>
        <p>O que faria um verdadeiro Guardião nesta situação?</p>
    </div>

    <div id="game-container">
        <div id="quiz-content">
            <div class="question" id="scenario-text">A carregar missão...</div>
            <div class="options" id="options-container"></div>
        </div>
        <div id="feedback"></div>
        <button id="btn-next" class="btn-next" onclick="nextScenario()">PRÓXIMO DILEMA ➔</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // Função do Menu Mobile
        function toggleMenu() {
            document.getElementById('nav-list').classList.toggle('active');
        }

        const scenarios = [
            {
                text: "Estás de férias noutro país e encontras uma semente de uma flor lindíssima e azul. Queres levá-la para plantar no teu jardim em casa. O que fazes?",
                options: [
                    { text: "Levo a semente escondida na mala, as plantas são sempre boas.", correct: false, msg: "Errado! Podes estar a transportar pragas ou doenças 'boleiras' que não existem no teu país." },
                    { text: "Não levo a semente. Não devemos transportar plantas entre países sem autorização.", correct: true, msg: "Correto! De acordo com o manual da ONU, viajar com plantas pode espalhar doenças perigosas." }
                ]
            },
            {
                text: "Estás a passear no parque e vês uma planta com as folhas cheias de manchas estranhas e buraquinhos que nunca tinhas visto. O que fazes?",
                options: [
                    { text: "Tiro uma foto e aviso um adulto ou um especialista em plantas.", correct: true, msg: "Exato! Identificar problemas cedo é o segredo para salvar as florestas." },
                    { text: "Arranco as folhas e deito-as no lixo comum.", correct: false, msg: "Cuidado! Mexer em plantas doentes pode ajudar a espalhar o fungo ou a bactéria para outras plantas." }
                ]
            }
        ];

        let currentIdx = 0;

        function loadScenario() {
            const scenario = scenarios[currentIdx];
            const optionsContainer = document.getElementById('options-container');
            const feedback = document.getElementById('feedback');
            const btnNext = document.getElementById('btn-next');

            document.getElementById('scenario-text').innerText = scenario.text;
            optionsContainer.innerHTML = '';
            feedback.style.display = 'none';
            btnNext.style.display = 'none';

            scenario.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => handleChoice(opt);
                optionsContainer.appendChild(btn);
            });
        }

        function handleChoice(opt) {
            const feedback = document.getElementById('feedback');
            const btnNext = document.getElementById('btn-next');
            
            feedback.innerText = opt.msg;
            feedback.style.display = 'block';
            feedback.className = opt.correct ? 'correct' : 'wrong';

            if(opt.correct) {
                confetti({ particleCount: 50, spread: 60, colors: ['#42f5a7'] });
                btnNext.style.display = 'inline-block';
                const buttons = document.querySelectorAll('.option-btn');
                buttons.forEach(b => b.style.pointerEvents = 'none');
            }
        }

        function nextScenario() {
            currentIdx++;
            if(currentIdx < scenarios.length) {
                loadScenario();
            } else {
                window.location.href = "certificado.html";
            }
        }

        window.onload = loadScenario;
    </script>
</body>
</html>
