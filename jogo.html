<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão de Campo | Guardiões das Plantas</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-onu: #2ecc71;
            --verde-escuro: #0b1d12;
            --morango: #ff4757;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--verde-escuro);
            color: white;
            font-family: 'Lexend', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Header Responsivo */
        .game-nav {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 20px;
            gap: 10px;
        }

        .stat-card {
            background: var(--glass);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--verde-onu);
            font-size: 0.9rem;
            flex: 1;
            text-align: center;
            white-space: nowrap;
        }

        /* Contentor do Jogo Responsivo */
        .viewport-wrapper {
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16 / 9; /* Mantém a proporção de cinema */
            max-height: 70vh; /* Impede que ocupe o ecrã todo em altura */
            position: relative;
            background-color: #000;
            border-radius: 20px;
            border: 4px solid var(--glass);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #viewport {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* A Praga - Corrigida para não herdar fundos */
        .praga {
            position: absolute;
            width: 8%; /* Tamanho relativo ao contentor */
            min-width: 40px;
            max-width: 80px;
            cursor: pointer;
            transition: transform 0.2s;
            filter: drop-shadow(0 0 10px rgba(255,0,0,0.7));
            z-index: 5;
            object-fit: contain; /* Garante que a imagem não distorce */
        }

        .praga:hover { transform: scale(1.2) rotate(10deg); }

        /* Scanner */
        .scanner {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--verde-onu);
            box-shadow: 0 0 15px var(--verde-onu);
            top: 0;
            animation: moveScan 4s linear infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes moveScan { from { top: 0; } to { top: 100%; } }

        /* Mensagens de Feedback */
        #msg-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            color: #111;
            padding: 20px 40px;
            border-radius: 50px;
            font-weight: 800;
            display: none;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .btn-back {
            margin-top: 20px;
            color: white;
            opacity: 0.6;
            text-decoration: none;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .stat-card { padding: 5px; font-size: 0.7rem; }
            body { padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="game-nav">
        <div class="stat-card">📍 <span id="loc-name">Carregando...</span></div>
        <div class="stat-card">✨ XP: <span id="xp">0</span></div>
        <div class="stat-card">🐛 Restam: <span id="pests-left">0</span></div>
    </div>

    <div class="viewport-wrapper">
        <div id="viewport"></div>
        <div class="scanner"></div>
        <div id="msg-overlay"></div>
    </div>

    <a href="historia.html" class="btn-back">← Voltar para a Teoria</a>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const scenarios = [
            { name: "Horta Comunitária", bg: "images/fundo-horta.jpg", pests: 4 },
            { name: "Floresta Profunda", bg: "images/fundo-floresta.jpg", pests: 5 },
            { name: "Cidade Verde", bg: "images/fundo-cidade.jpg", pests: 4 }
        ];

        let currentLevel = 0;
        let xp = 0;
        let pestsFound = 0;

        function initLevel() {
            const s = scenarios[currentLevel];
            const vp = document.getElementById('viewport');
            
            document.getElementById('loc-name').innerText = s.name;
            document.getElementById('pests-left').innerText = s.pests;
            
            // Força a imagem de fundo corretamente
            vp.style.backgroundImage = `url('${s.bg}')`;
            vp.innerHTML = '';
            pestsFound = 0;

            for(let i=0; i < s.pests; i++) {
    const p = document.createElement('img');
    
    // 1. Cria a lista com os nomes das tuas 4 imagens
    const listaPragas = ['i1.png', 'i2.png', 'i3.png', 'i4.png'];
    
    // 2. Escolhe um número ao calhas entre 0 e 3
    const sorteio = Math.floor(Math.random() * listaPragas.length);
    
    // 3. Define o src usando o nome que saiu no sorteio
    p.src = 'images/' + listaPragas[sorteio];
                
                p.className = 'praga';
                
                // Posições em % para manter responsividade
                p.style.top = (Math.random() * 70 + 10) + '%';
                p.style.left = (Math.random() * 80 + 5) + '%';
                
                p.onclick = (e) => {
                    e.stopPropagation();
                    p.style.transform = "scale(0) rotate(90deg)";
                    setTimeout(() => p.remove(), 200);
                    
                    pestsFound++;
                    xp += 150;
                    document.getElementById('xp').innerText = xp;
                    document.getElementById('pests-left').innerText = s.pests - pestsFound;
                    
                    if(pestsFound === s.pests) finishLevel();
                };
                vp.appendChild(p);
            }
        }

        function finishLevel() {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            currentLevel++;
            
            if(currentLevel < scenarios.length) {
                showFeedback("CENÁRIO LIMPO! 🌿");
                setTimeout(initLevel, 2000);
            } else {
                showFeedback("MISSÃO CUMPRIDA! 🎖️");
                setTimeout(() => {
                    // Substitui pela tua página final
                    window.location.href = "certificado.html"; 
                }, 3000);
            }
        }

        function showFeedback(txt) {
            const msg = document.getElementById('msg-overlay');
            msg.innerText = txt;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 1800);
        }

        // Inicia o jogo
        window.onload = initLevel;
    </script>
</body>
</html>
