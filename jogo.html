<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão de Campo | Guardiões das Plantas</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow-green: #42f5a7;
            --bg-deep: #061512;
            --strawberry: #ff4757;
            --strawberry-dark: #b33939;
            --glass: rgba(6, 21, 18, 0.85);
            --line-color: rgba(66, 245, 167, 0.2);
        }

        body {
            background-color: var(--bg-deep);
            color: white;
            font-family: 'Lexend', sans-serif;
            margin: 0;
            padding: 100px 20px 20px; /* Espaço para o menu fixo no topo */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; 
            box-sizing: border-box;
        }

        /* --- ESTILO DA NAVBAR (PADRÃO GLOBAL) --- */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 8%;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--line-color);
            z-index: 2000;
            box-sizing: border-box;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            color: var(--glow-green);
        }

        .nav-logo img { width: 30px; filter: drop-shadow(0 0 5px var(--glow-green)); }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            opacity: 0.7;
        }

        .nav-links a:hover { opacity: 1; color: var(--glow-green); }

        .menu-toggle { display: none; cursor: pointer; }
        .bar { display: block; width: 25px; height: 3px; margin: 5px; background-color: white; transition: 0.3s; }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .nav-links {
                display: none;
                position: absolute;
                top: 100%; left: 0; width: 100%;
                background: rgba(6, 21, 18, 0.95);
                flex-direction: column; padding: 20px; text-align: center;
            }
            .nav-links.active { display: flex; }
        }

        /* --- INTERFACE DO JOGO --- */
        .game-nav {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 1100px;
            margin-bottom: 20px;
            gap: 15px;
            z-index: 100;
        }

        .stat-card {
            background: rgba(0,0,0,0.6);
            padding: 12px 25px;
            border-radius: 15px;
            border: 2px solid var(--glow-green);
            box-shadow: 0 0 15px rgba(66, 245, 167, 0.2);
            flex: 1;
            text-align: center;
            font-weight: 800;
            font-size: 0.9rem;
            color: var(--glow-green);
            text-transform: uppercase;
        }

        .viewport-wrapper {
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 16 / 9;
            max-height: 65vh;
            position: relative;
            background-color: #000;
            border-radius: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }

        #viewport {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .pest {
            position: absolute;
            width: 10%;
            min-width: 50px;
            max-width: 90px;
            cursor: pointer;
            z-index: 50;
            filter: drop-shadow(0 0 10px rgba(255, 71, 87, 0.5));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pest:hover { transform: scale(1.2) rotate(5deg); filter: drop-shadow(0 0 20px var(--strawberry)); }

        .scan-bar {
            position: absolute;
            width: 100%;
            height: 3px;
            background: var(--glow-green);
            box-shadow: 0 0 20px var(--glow-green);
            top: 0;
            animation: scanMove 5s linear infinite;
            z-index: 10;
            pointer-events: none;
            opacity: 0.6;
        }

        @keyframes scanMove { from { top: 0; } to { top: 100%; } }

        #alert-box {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white; color: var(--bg-deep);
            padding: 25px 50px; border-radius: 50px;
            font-weight: 800; font-size: 1.5rem;
            display: none; z-index: 200;
            box-shadow: 0 0 50px rgba(255,255,255,0.5);
            text-align: center;
        }

        .btn-exit {
            margin-top: 20px;
            color: var(--glow-green);
            text-decoration: none;
            font-size: 0.8rem;
            opacity: 0.6;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <!-- MENU DE NAVEGAÇÃO -->
    <nav class="navbar">
        <div class="nav-logo">
            <img src="images/super-morango.png" alt="Logo">
            <span>GUARDIÕES</span>
        </div>
        <ul class="nav-links" id="nav-list">
            <li><a href="index.html">Início</a></li>
            <li><a href="historia.html">História</a></li>
            <li><a href="jogo.html">Missão</a></li>
            <li><a href="decisoes.html">Laboratório</a></li>
            <li><a href="saiba-mais.html">Saiba Mais</a></li>
            <li><a href="recursos.html">Recursos</a></li>
        </ul>
        <div class="menu-toggle" onclick="toggleMenu()">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>

    <div class="game-nav">
        <div class="stat-card">📍 <span id="loc-name">A carregar...</span></div>
        <div class="stat-card">✨ XP: <span id="xp-val">0</span></div>
        <div class="stat-card">🐛 Alvos: <span id="target-count">0</span></div>
    </div>

    <div class="viewport-wrapper">
        <div id="viewport"></div>
        <div class="scan-bar"></div>
        <div id="alert-box"></div>
    </div>

    <a href="historia.html" class="btn-exit">← Abandonar Missão</a>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // Função do Menu Mobile
        function toggleMenu() {
            document.getElementById('nav-list').classList.toggle('active');
        }

        const levels = [
            { name: "Horta Comunitária", bg: "images/fundo-horta.jpg", pests: 4 },
            { name: "Reserva Florestal", bg: "images/fundo-floresta.jpg", pests: 5 },
            { name: "Pulmão da Cidade", bg: "images/fundo-cidade.jpg", pests: 4 }
        ];

        const pestImages = ["i1.png", "i2.png", "i3.png", "i4.png"];

        let currentLevel = 0;
        let score = 0;
        let foundInLevel = 0;

        function initLevel() {
            const data = levels[currentLevel];
            const vp = document.getElementById('viewport');
            
            document.getElementById('loc-name').innerText = data.name;
            document.getElementById('target-count').innerText = data.pests;
            
            vp.style.backgroundImage = `url('${data.bg}')`;
            vp.innerHTML = ''; 
            foundInLevel = 0;

            for(let i=0; i < data.pests; i++) {
                const imgElement = document.createElement('img');
                const randomPest = pestImages[Math.floor(Math.random() * pestImages.length)];
                imgElement.src = `images/${randomPest}`;
                imgElement.className = 'pest';
                
                imgElement.style.top = (Math.random() * 75 + 10) + '%';
                imgElement.style.left = (Math.random() * 85 + 5) + '%';
                
                imgElement.onclick = (e) => {
                    e.stopPropagation();
                    score += 250;
                    foundInLevel++;
                    document.getElementById('xp-val').innerText = score;
                    document.getElementById('target-count').innerText = data.pests - foundInLevel;
                    
                    imgElement.style.transform = "scale(0) rotate(180deg)";
                    setTimeout(() => imgElement.remove(), 300);

                    if(foundInLevel === data.pests) {
                        completeLevel();
                    }
                };
                vp.appendChild(imgElement);
            }
        }

        function completeLevel() {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#42f5a7', '#ff4757', '#ffffff']
            });

            currentLevel++;
            if(currentLevel < levels.length) {
                showAlert("ÁREA LIMPA! 🌿");
                setTimeout(initLevel, 2500);
            } else {
                showAlert("MISSÃO GLOBAL CONCLUÍDA! 🎖️");
                setTimeout(() => {
                   window.location.href = "decisoes.html";  
                }, 3000);
            }
        }

        function showAlert(text) {
            const box = document.getElementById('alert-box');
            box.innerText = text;
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 2200);
        }

        window.onload = initLevel;
    </script>
</body>
</html>
