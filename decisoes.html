        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--glow-green); text-shadow: 0 0 10px rgba(66, 245, 167, 0.5); }

        /* Contentor do Dilema */
        #game-container {
            background: rgba(6, 21, 18, 0.9);
            border: 2px solid var(--glow-green);
            border-radius: 30px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 0 40px rgba(66, 245, 167, 0.2);
            text-align: center;
            transition: all 0.5s ease;
        }

        .scenario-img {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--glow-green);
        }

        .question { font-size: 1.4rem; margin-bottom: 30px; line-height: 1.5; }

        /* Botões de Opção */
        .options { display: grid; gap: 15px; }
        .option-btn {
            background: var(--glass);
            border: 1px solid var(--glow-green);
            color: white;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
            text-align: left;
        }
        .option-btn:hover { background: var(--glow-green); color: var(--bg-deep); transform: translateX(10px); }

        /* Feedback */
        #feedback {
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            display: none;
            font-weight: bold;
        }
        .correct { background: rgba(46, 204, 113, 0.3); color: #2ecc71; border: 1px solid #2ecc71; }
        .wrong { background: rgba(231, 76, 60, 0.3); color: #ff4757; border: 1px solid #ff4757; }

        #btn-next {
            background: var(--strawberry);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            font-weight: 800;
            margin-top: 30px;
            cursor: pointer;
            display: none;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.4);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Laboratório de Decisões</h1>
        <p>O que faria um verdadeiro Guardião nesta situação?</p>
    </div>

    <div id="game-container">
        <!-- O conteúdo será gerado pelo JavaScript -->
        <div id="quiz-content">
            <div class="question" id="scenario-text">A carregar missão...</div>
            <div class="options" id="options-container"></div>
        </div>
        <div id="feedback"></div>
        <button id="btn-next" onclick="nextScenario()">PRÓXIMO DILEMA ➔</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const scenarios = [
            {
                text: "Estás de férias noutro país e encontras uma semente de uma flor lindíssima e azul. Queres levá-la para plantar no teu jardim em casa. O que fazes?",
                options: [
                    { text: "Levo a semente escondida na mala, as plantas são sempre boas.", correct: false, msg: "Errado! Podes estar a transportar pragas ou doenças 'boleiras' que não existem no teu país." },
                    { text: "Não levo a semente. Não devemos transportar plantas entre países sem autorização.", correct: true, msg: "Correto! De acordo com o manual da ONU, viajar com plantas pode espalhar doenças perigosas." }
                ]
            },
            {
                text: "Estás a passear no parque e vês uma planta com as folhas cheias de manchas estranhas e buraquinhos que nunca tinhas visto. O que fazes?",
                options: [
                    { text: "Tiro uma foto e aviso um adulto ou um especialista em plantas.", correct: true, msg: "Exato! Identificar problemas cedo é o segredo para salvar as florestas." },
                    { text: "Arranco as folhas e deito-as no lixo comum.", correct: false, msg: "Cuidado! Mexer em plantas doentes pode ajudar a espalhar o fungo ou a bactéria para outras plantas." }
                ]
            },
            {
                text: "O teu pai quer comprar sementes de um país muito distante através da internet porque são mais baratas. O que lhe dizes?",
                options: [
                    { text: "Explico que sementes online de origem desconhecida podem trazer pragas invasoras.", correct: true, msg: "Bem pensado! Pequenas encomendas por correio são uma das maiores vias de entrada de pragas." },
                    { text: "Digo para comprar o máximo possível para poupar dinheiro.", correct: false, msg: "Mau plano! Isso coloca em risco todos os agricultores e jardins da tua região." }
                ]
            },
            {
                text: "Encontras uma abelha pousada numa flor na tua horta. Qual é a tua reação?",
                options: [
                    { text: "Tento enxotá-la ou usar um inseticida, ela pode morder-me!", correct: false, msg: "Não! As abelhas são 'insetos úteis'. Elas ajudam na polinização e na saúde das plantas." },
                    { text: "Deixo-a trabalhar. Ela é uma aliada importante para as plantas produzirem sementes.", correct: true, msg: "Perfeito! Insetos úteis como abelhas e joaninhas são amigos dos Guardiões." }
                ]
            }
        ];

        let currentIdx = 0;

        function loadScenario() {
            const scenario = scenarios[currentIdx];
            const optionsContainer = document.getElementById('options-container');
            const feedback = document.getElementById('feedback');
            const btnNext = document.getElementById('btn-next');

            document.getElementById('scenario-text').innerText = scenario.text;
            optionsContainer.innerHTML = '';
            feedback.style.display = 'none';
            btnNext.style.display = 'none';

            scenario.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => handleChoice(opt);
                optionsContainer.appendChild(btn);
            });
        }

        function handleChoice(opt) {
            const feedback = document.getElementById('feedback');
            const btnNext = document.getElementById('btn-next');
            
            feedback.innerText = opt.msg;
            feedback.style.display = 'block';
            feedback.className = opt.correct ? 'correct' : 'wrong';

            if(opt.correct) {
                confetti({ particleCount: 50, spread: 60, colors: ['#42f5a7'] });
                btnNext.style.display = 'inline-block';
                // Desativar botões após escolha correta
                const buttons = document.querySelectorAll('.option-btn');
                buttons.forEach(b => b.style.pointerEvents = 'none');
            }
        }

        function nextScenario() {
            currentIdx++;
            if(currentIdx < scenarios.length) {
                loadScenario();
            } else {
                window.location.href = "certificado.html";
            }
        }

        window.onload = loadScenario;
    </script>
</body>
</html>
