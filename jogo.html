<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão de Campo | Guardiões das Plantas</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow-green: #42f5a7;
            --bg-deep: #061512;
            --strawberry: #ff4757;
            --glass: rgba(66, 245, 167, 0.1);
        }

        body {
            background-color: var(--bg-deep);
            color: white;
            font-family: 'Lexend', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Evita scroll durante o jogo */
        }

        /* Painel de Estatísticas Superior */
        .game-nav {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 1100px;
            margin-bottom: 20px;
            gap: 15px;
            z-index: 100;
        }

        .stat-card {
            background: rgba(0,0,0,0.6);
            padding: 12px 25px;
            border-radius: 15px;
            border: 2px solid var(--glow-green);
            box-shadow: 0 0 15px rgba(66, 245, 167, 0.2);
            flex: 1;
            text-align: center;
            font-weight: 800;
            font-size: 1rem;
            color: var(--glow-green);
            text-transform: uppercase;
        }

        /* Contentor do Jogo */
        .viewport-wrapper {
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 16 / 9;
            max-height: 75vh;
            position: relative;
            background-color: #000;
            border-radius: 30px;
            border: 3px solid var(--glass);
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }

        #viewport {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
            transition: background-image 0.8s ease-in-out;
        }

        /* As Pragas i1, i2, i3, i4 */
        .pest {
            position: absolute;
            width: 10%; /* Escala relativa ao tamanho do mapa */
            min-width: 50px;
            max-width: 90px;
            cursor: pointer;
            z-index: 50;
            filter: drop-shadow(0 0 10px rgba(255, 71, 87, 0.5));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pest:hover {
            transform: scale(1.2) rotate(5deg);
            filter: drop-shadow(0 0 20px var(--strawberry));
        }

        /* Scanner Neon */
        .scan-bar {
            position: absolute;
            width: 100%;
            height: 3px;
            background: var(--glow-green);
            box-shadow: 0 0 20px var(--glow-green);
            top: 0;
            animation: scanMove 5s linear infinite;
            z-index: 10;
            pointer-events: none;
            opacity: 0.6;
        }

        @keyframes scanMove { from { top: 0; } to { top: 100%; } }

        /* Mensagem de Alerta Central */
        #alert-box {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white; color: var(--bg-deep);
            padding: 25px 50px; border-radius: 50px;
            font-weight: 800; font-size: 1.5rem;
            display: none; z-index: 200;
            box-shadow: 0 0 50px rgba(255,255,255,0.5);
            text-align: center;
        }

        .btn-exit {
            margin-top: 20px;
            color: var(--glow-green);
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.7;
            transition: 0.3s;
        }
        .btn-exit:hover { opacity: 1; text-shadow: 0 0 10px var(--glow-green); }

    </style>
</head>
<body>

    <div class="game-nav">
        <div class="stat-card">📍 <span id="loc-name">A carregar...</span></div>
        <div class="stat-card">✨ XP: <span id="xp-val">0</span></div>
        <div class="stat-card">🐛 Alvos: <span id="target-count">0</span></div>
    </div>

    <div class="viewport-wrapper">
        <div id="viewport"></div>
        <div class="scan-bar"></div>
        <div id="alert-box"></div>
    </div>

    <a href="historia.html" class="btn-exit">← Abandonar Missão</a>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // CONFIGURAÇÕES DOS CENÁRIOS
        const levels = [
            { name: "Horta Comunitária", bg: "images/fundo-horta.jpg", pests: 4 },
            { name: "Reserva Florestal", bg: "images/fundo-floresta.jpg", pests: 5 },
            { name: "Pulmão da Cidade", bg: "images/fundo-cidade.jpg", pests: 4 }
        ];

        // CONFIGURAÇÃO DAS IMAGENS DAS PRAGAS (i1, i2, i3, i4)
        const pestImages = ["i1.png", "i2.png", "i3.png", "i4.png"];

        let currentLevel = 0;
        let score = 0;
        let foundInLevel = 0;

        function initLevel() {
            const data = levels[currentLevel];
            const vp = document.getElementById('viewport');
            
            document.getElementById('loc-name').innerText = data.name;
            document.getElementById('target-count').innerText = data.pests;
            
            vp.style.backgroundImage = `url('${data.bg}')`;
            vp.innerHTML = ''; // Limpa nível anterior
            foundInLevel = 0;

            for(let i=0; i < data.pests; i++) {
                const imgElement = document.createElement('img');
                
                // ESCOLHA ALEATÓRIA DA PRAGA (i1 a i4)
                const randomPest = pestImages[Math.floor(Math.random() * pestImages.length)];
                imgElement.src = `images/${randomPest}`;
                
                imgElement.className = 'pest';
                
                // Posição aleatória (dentro da zona de segurança do contentor)
                imgElement.style.top = (Math.random() * 75 + 10) + '%';
                imgElement.style.left = (Math.random() * 85 + 5) + '%';
                
                imgElement.onclick = (e) => {
                    e.stopPropagation();
                    score += 250;
                    foundInLevel++;
                    
                    document.getElementById('xp-val').innerText = score;
                    document.getElementById('target-count').innerText = data.pests - foundInLevel;
                    
                    // Animação de eliminação
                    imgElement.style.transform = "scale(0) rotate(180deg)";
                    setTimeout(() => imgElement.remove(), 300);

                    if(foundInLevel === data.pests) {
                        completeLevel();
                    }
                };
                vp.appendChild(imgElement);
            }
        }

        function completeLevel() {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#42f5a7', '#ff4757', '#ffffff']
            });

            currentLevel++;
            if(currentLevel < levels.length) {
                showAlert("ÁREA LIMPA! 🌿 Próxima localização detectada...");
                setTimeout(initLevel, 2500);
            } else {
                showAlert("MISSÃO GLOBAL CONCLUÍDA! 🎖️");
                setTimeout(() => {
                    // Aqui irás para a página do Certificado
                    window.location.href = "certificado.html"; 
                }, 3000);
            }
        }

        function showAlert(text) {
            const box = document.getElementById('alert-box');
            box.innerText = text;
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 2200);
        }

        // Início Automático
        window.onload = initLevel;
    </script>
</body>
</html>
