<!DOCTYPE html>
<html lang="pt">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardiões das Plantas | Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;800&display=swap" rel="stylesheet">
</head>
<body>

    <section id="portal">
        <!-- Badge da ONU -->
        <div style="border: 1px solid #2ecc71; color: #2ecc71; padding: 8px 20px; border-radius: 50px; margin-bottom: 20px; font-size: 0.8rem; font-weight: bold;">
            12 DE MAIO: DIA INTERNACIONAL DA SAÚDE DAS PLANTAS
        </div>

        <!-- Imagem do Super Morango -->
        <img src="images/super-morango.png" alt="Super Morango" style="width: 300px; margin-bottom: 30px; filter: drop-shadow(0 0 20px rgba(46, 204, 113, 0.3));">

        <h1>Protege o Verde,<br><span class="highlight">Salva o Futuro.</span></h1>
        
        <p style="max-width: 600px; margin-bottom: 40px; font-size: 1.2rem; opacity: 0.9;">
            Torna-te um Guardião oficial e ajuda o Super Morango a proteger o oxigénio do nosso planeta.
        </p>

        <div style="display: flex; gap: 20px;">
            <!-- BOTÃO PRINCIPAL COM LINK DIRETO PARA A PRÓXIMA PÁGINA -->
            <a href="historia.html" class="btn-main">Entrar na Missão</a>
            <a href="historia.html#recursos" class="btn-sec">Ver Recursos</a>
